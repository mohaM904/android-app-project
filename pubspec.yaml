name: safewalk
description: A mobile application for pedestrian safety.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  sensors_plus: ^7.0.0
  camera: ^0.12.0+1
  vibration: ^3.1.8
  audioplayers: ^6.6.0
  geolocator: ^13.0.1
  url_launcher: ^6.3.1
  shared_preferences: ^2.3.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/alert.mp3  # Add your sound file here